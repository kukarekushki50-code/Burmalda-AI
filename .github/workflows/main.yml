name: Build Windows EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install customtkinter requests pyinstaller pillow
        
    - name: Build EXE
      run: |
        pyinstaller --noconsole --onefile --icon=app_icon.ico --add-data "app_icon.ico;." burmalda_ai.py
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BurmaldaAI-EXE
        path: dist/burmalda_ai.exe
